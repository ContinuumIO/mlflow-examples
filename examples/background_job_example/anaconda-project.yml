name: background_job_example

commands:
  #############################################################################
  # Run Time Commands
  #############################################################################

  # The `Worker` is used to launch background jobs.  Leave as-is under most conditions.
  Worker:
    env_spec: worker
    unix: python -m mlflow_adsp.services.worker

  # Example workflow entry points

  # Running the workflow from the command line
  python:main:
    env_spec: default
    unix: python -m steps.main

  # Run `process_one` workflow step from the command line
  python:process_one:
    env_spec: default
    unix: python -m steps.process_one

  # Before invoking MLFlow commands directly, please review the notes in `variables`.

  # Running the workflow from the MLFlow command line
  mlflow:main:
    env_spec: default
    unix: mlflow run . --env-manager local

  # Run `process_one` workflow step from the MLFlow command line
  mlflow:process_one:
    env_spec: default
    unix: mlflow run -e process_one . --env-manager local

  #############################################################################
  # Development Time Commands
  #############################################################################

  bash:
    env_spec: default
    unix: |
      bash

  clean:
    env_spec: default
    unix: |
      rm -rf .coverage htmlcov coverage.xml build docs/build .pytest_cache test/unit/.pytest_cache

  lint:
    env_spec: default
    unix: |
      pylint steps
      isort --check --diff .
      black --line-length=120 --target-version=py38 --check --diff .

  lint:fix:
    env_spec: default
    unix: |
      isort .
      black --line-length=120 --target-version=py38 .

variables:
  MLFLOW_DISABLE_ENV_MANAGER_CONDA_WARNING: "TRUE"

  # If these are NOT defined as AE User Secrets they MUST be set here.
  # AE5_HOSTNAME:
  # AE5_USERNAME:
  # AE5_PASSWORD:

  # If invoking MLFlow from the command line, then these MUST be set:
  # MLFLOW_TRACKING_URI:
  # MLFLOW_REGISTRY_URI:
  # MLFLOW_TRACKING_TOKEN:

  # Project Level

  # When invoking workflow steps async, it appears that the mlflow api appends (a) parameter(s) for the
  # experiment name and/or id. If this is set when using async steps I see this error generated:
  # `Specify only one of 'experiment-name' or 'experiment-id' options.`
  # If someone knows how to resolve this please let me know!
  # MLFLOW_EXPERIMENT_NAME: SimpleBackgroundJobExample
  #
  # In the interum, we'll define our own and ensure we create and assign within logic.
  AE_MLFLOW_EXPERIMENT_NAME: background_job_example

channels:
    - https://conda.anaconda.org/conda-forge
    - https://conda.anaconda.org/joshburt
    - https://conda.anaconda.org/ae5-admin

platforms:
  - linux-64
  - osx-64
  - osx-arm64
  - win-64

env_specs:
  default:
    description: Default Environment
    packages:
      # Language Level
      - python=3.8

      # MLFlow
      - mlflow=2.0.1
      - make
      - virtualenv
      - pip
      - click

      # AE5
      - ipykernel
      - ae5-tools
      - anaconda.enterprise.server.common.sdk

      # AE5 [MLFlow]
      - mlflow-adsp

      # Project Maintenance and Development
      - isort
      - pylint
      - black
      - jupyter-black
      - pytest
      - pytest-cov
      - python-dotenv

  worker:
    description: Worker Environment
    packages:
      # Language Level
      - python=3.8

      # MLFlow
      - mlflow=2.0.1
      - make
      - virtualenv
      - pip
      - click

      # AE5
      - ipykernel
      - ae5-tools
      - anaconda.enterprise.server.common.sdk

      # AE5 [MLFlow]
      - mlflow-adsp
